<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body> 
     <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="homepage.html">Book<span>Store</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="homepage.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="produtsPage.html">Products</a></li>
            <li class="nav-item"><a class="nav-link active" href="companyPage.html">About</a></li>

          </ul>
        </div>
      </div>
    </nav>

    <h2 style="margin-top: 80px;">Shopping Cart</h2>    <hr>

    <div class="row">
        <div class="col-12">
            <table class="table" id="tbl">
                </table>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-12 text-right">
            <h4>Total: <span id="total">0</span> SAR</h4>
            <br>
            <button class="btn btn-secondary" onclick="checkout()">Order</button>
            <a href="produtsPage.html" class="btn btn-outline-dark">Back to Products</a>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var cartitems = JSON.parse(localStorage.getItem('myCart')) || [];

        function display() {
            var ta = "<thead><tr><th>Product</th><th>Price</th><th>Quantity</th><th>Subtotal</th></tr></thead><tbody>";;
            var grand = 0;

            if (cartitems.length == 0) {
                document.getElementById("tbl").innerHTML = "<tr><td colspan='4' class='text-center'>Your cart is empty</td></tr>";
                document.getElementById("total").innerText = "0";
           
            }

            for (var i = 0; i < cartitems.length; i++) {
                var sub = cartitems[i].price * cartitems[i].quant;
                grand += sub;

                ta += "<tr>";
                ta += "<td>" + cartitems[i].name + "</td>";
                ta += "<td>" + cartitems[i].price + " SAR</td>";
                ta += "<td>" + cartitems[i].quant + "</td>";
                ta += "<td>" + sub + " SAR</td>";
                ta += "</tr>";
            }
            ta += "</tbody>";
            
            document.getElementById("tbl").innerHTML = ta;
            document.getElementById("total").innerText = grand;
        }
        function checkout() {
            if (cartitems.length == 0) {
                alert("Cart is empty");
                return;
            }

            alert("Payment successful");
 
            localStorage.removeItem('myCart');
            cartitems = [];
            display();
        }
        display();
    </script>
</body>
</html>
