<form id="loginForm">

<h1>LOGIN</h1>

<label>Username</label><br>
<input type="text" id="loginUser"><br><br>

<label>Password</label><br>
<input type="password" id="loginPass"><br><br>

<button type="submit">Login</button>
<p> donot have account? <a href="register.html" target="_blank">Create Account</a></p>


</form>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  var savedUser = localStorage.getItem("username");
  var savedPass = localStorage.getItem("password");

  var user = document.getElementById("loginUser").value;
  var pass = document.getElementById("loginPass").value;

  if (user === savedUser && pass === savedPass) {
    Swal.fire({
      icon: "success",
      title: "Login Successful"
    }).then(() => {
      window.location.href = "homepage.html"; 
    });
  } else {
    Swal.fire({
      icon: "error",
      title: "Invalid login",
      text: "Username or password is not correct"
    });
  }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
